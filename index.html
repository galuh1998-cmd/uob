<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UOB Personal Internet Banking</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:#004a99; /* warna biru sesuai background */
    display: flex;
    justify-content: center;
    align-items: flex-start;
    height: 100vh;
    padding-top: 50px;
    color: #000;
  }
  .container {
    background: #fff;
    padding: 25px 30px;
    border-radius: 4px;
    width: 320px;
    box-sizing: border-box;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: bold;
    font-size: 24px;
    color: #0056b3;
    margin-bottom: 20px;
  }
  .red-bars {
    color: #d50000;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 3px;
  }
  .language {
    text-align: right;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .language a {
    text-decoration: none;
    color: #0073e6;
    margin-left: 8px;
  }
  h2 {
    font-weight: 500;
    font-size: 18px;
    margin: 0 0 20px 0;
    color: #333;
  }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px 8px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    font-size: 13px;
    box-sizing: border-box;
    text-transform: uppercase;
    color: #999;
  }
  input::placeholder {
    color: #999;
  }
  button {
    width: 100%;
    background-color: #0073e6;
    border: none;
    color: white;
    padding: 10px 0;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 2px;
  }
  button:hover {
    background-color: #005bb5;
  }
  .forgot {
    margin-top: 10px;
    font-size: 13px;
  }
  .forgot a {
    color: #0073e6;
    text-decoration: none;
  }
  .register {
    margin-top: 30px;
    font-size: 13px;
    color: #666;
  }
  .register a {
    color: #0073e6;
    cursor: pointer;
    text-decoration: none;
  }

  .footer {
    margin-top: 80px;
    text-align: center;
    color: #fff;
    font-size: 14px;
  }
  .footer img,
  .footer .appstore,
  .footer .googleplay {
    margin: 5px 3px 0;
    vertical-align: middle;
  }
  .footer a {
    color: #aee4ff;
    text-decoration: none;
    font-size: 13px;
  }
  .footer .uob-icon {
    background-color: #004a99;
    vertical-align: middle;
    display: inline-block;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 18px;
  }
  .footer .tmrw {
    color: #f94f00;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <span class="red-bars">|||</span>
    UOB
  </div>
  <div class="language">
    <a href="#">English</a> | <a href="#">Bahasa Indonesia</a>
  </div>
  <h2>Welcome to UOB Personal Internet Banking</h2>
  <form>
    <input type="text" placeholder="USERNAME" />
    <input type="password" placeholder="PASSWORD" />
    <button type="submit">Login</button>
  </form>
  <div class="forgot">
    <a href="#">Forgot Username/Password?</a>
  </div>

  <div class="register">
    Don't have an account?<br />
    <a href="#">Register now!</a>
  </div>
</div>

<div class="footer">
  <span class="uob-icon">
    <span class="red-bars">|||</span> UOB <span class="tmrw">TMRW</span><br>ID
  </span>
  <div>
    <a href="https://tmrw.bz/wealth" target="_blank" style="color:#aee4ff; margin-left: 12px;">tmrw.bz/wealth</a>
  </div>
  <div style="margin-top:8px;">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play" style="height:25px;">
    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="App Store" style="height:25px; margin-left:8px;">
  </div>
</div>

</body>
</html>
