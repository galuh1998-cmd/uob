<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UOB Personal Internet Banking</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0057b7, #003d7a); /* Mirip warna biru */
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }
  .logo {
    margin: 20px 0 10px 20px;
    font-weight: bold;
    font-size: 28px;
    color: #0057b7;
    display: flex;
    align-items: center;
  }
  .logo .red-bars {
    width: 20px;
    height: 28px;
    background: repeating-linear-gradient(
      to right,
      #d71920,
      #d71920 3px,
      transparent 3px,
      transparent 6px
    );
    margin-right: 10px;
  }
  .login-container {
    background: #fff;
    border-radius: 4px;
    width: 320px;
    max-width: 90%;
    padding: 20px 30px;
    box-shadow: 0 0 10px rgb(0 0 0 / 0.1);
    margin-bottom: 40px;
  }
  .language {
    text-align: right;
    font-size: 13px;
    margin-bottom: 15px;
  }
  .language a {
    color: #5e5e5e;
    text-decoration: none;
    margin-left: 7px;
  }
  .language a:hover {
    text-decoration: underline;
  }
  h2 {
    margin: 8px 0 20px 0;
    font-weight: 500;
    font-size: 20px;
    color: #333;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 14px 10px;
    margin: 6px 0 15px;
    box-sizing: border-box;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 2px;
    color: #999;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: #0057b7;
    color: #333;
    outline: none;
  }
  button {
    background-color: #0072ce;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 3px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background-color: #0057b7;
  }
  .forgot-link, .register-link {
    color: #0072ce;
    font-size: 13px;
    text-decoration: none;
    display: inline-block;
    margin-top: 10px;
  }
  .forgot-link:hover, .register-link:hover {
    text-decoration: underline;
  }
  .register-section {
    margin-top: 15px;
    font-size: 14px;
    color: #666;
  }
  /* Footer with TMRW logo and apps */
  .footer {
    text-align: center;
    margin-top: auto;
    margin-bottom: 20px;
  }
  .tmrw-logo {
    display: inline-block;
    background-color: #0057b7;
    color: #fff;
    padding: 10px 15px;
    border-radius: 7px;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 8px;
    vertical-align: middle;
    position: relative;
    line-height: 24px;
  }
  .tmrw-logo .red-bars {
    width: 20px;
    height: 24px;
    background: repeating-linear-gradient(
      to right,
      #d71920,
      #d71920 3px,
      transparent 3px,
      transparent 6px
    );
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  .tmrw-logo span {
    vertical-align: middle;
  }
  .search-box {
    display: inline-block;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 5px 10px;
    margin-left: 10px;
    vertical-align: middle;
    font-size: 14px;
    background: #fff;
  }
  .app-icons {
    margin-top: 8px;
  }
  .app-icons img {
    height: 30px;
    margin: 0 6px;
    vertical-align: middle;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="logo">
  <div class="red-bars"></div>UOB
</div>

<div class="login-container" role="main">
  <div class="language">
    <a href="#">English</a> | <a href="#">Bahasa Indonesia</a>
  </div>
  <h2>Welcome to UOB Personal Internet Banking</h2>
  
  <form id="loginForm" action="javascript:void(0);" aria-label="Login form">
    <input type="text" id="username" name="username" placeholder="USERNAME" aria-label="Username" required autofocus />
    <input type="password" id="password" name="password" placeholder="PASSWORD" aria-label="Password" required />
    <button type="submit" id="loginBtn">Login</button>
  </form>
  <a href="#" class="forgot-link">Forgot Username/Password?</a>
  <div class="register-section">
    Don't have an account?<br />
    <a href="#" class="register-link">Register now!</a>
  </div>
</div>

<div class="footer" aria-label="Footer and app download">
  <div class="tmrw-logo" aria-label="TMRW by UOB logo">
    <div class="red-bars"></div><span>UOB</span> TMRW ID
  </div>
  <input type="text" class="search-box" placeholder="tmrw.bz/wealth" aria-label="Search tmrw.bz wealth" />
  <div class="app-icons">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/67/App_Store_(iOS).svg" alt="App Store" />
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d7/Google_Play_Arrow_logo.svg" alt="Google Play" />
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function() {
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value.trim();
    
    if (!user || !pass) {
      alert('Please enter both username and password.');
      return;
    }
    
    // Contoh alert login
    alert('Log in submitted for user: ' + user);
    
    // Di sini bisa ditambah aksi login sebenarnya
  });
</script>

</body>
</html>
